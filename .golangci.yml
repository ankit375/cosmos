run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - revive
    - gosec
    - bodyclose
    - noctx
    - exportloopref

linters-settings:
  govet:
    check-shadowing: true
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/yourorg/cloudctrl
  revive:
    rules:
      - name: unexported-return
        disabled: true
  gosec:
    excludes:
      - G104  # Unhandled errors (we handle these explicitly)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - unparam
  max-issues-per-linter: 50
  max-same-issues: 10
